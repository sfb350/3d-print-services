<!DOCTYPE html>
<html>
<head>
<title>3D Print Request</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.box{
background:white;
width:500px;
margin:auto;
padding:30px;
margin-top:50px;
border-radius:10px;
}

input, textarea, select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#28a745;
color:white;
border:none;
padding:12px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Request a 3D Print</h2>

<form action="https://formspree.io/f/meerkgkn" method="POST" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<select name="material">
<option>PLA</option>
<option>PETG</option>
<option>ABS</option>
<option>TPU</option>
</select>

<input type="number" name="quantity" placeholder="Quantity">

<textarea name="description" placeholder="Describe your print"></textarea>

<input type="file" name="file">

<button type="submit">Request Quote</button>

</form>

</div>

</body>
</html>
