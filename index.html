<!DOCTYPE html>
<html>
<head>
<title>Abe's 3D Printing</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family:Arial, Helvetica, sans-serif;
  margin:0;
  background:#0f172a;
  color:white;
}

header{
  text-align:center;
  padding:50px 20px;
  background:#1e293b;
}

header h1{
  font-size:40px;
  margin-bottom:10px;
}

header p{
  font-size:18px;
  opacity:.9;
}

.container{
  max-width:650px;
  margin:40px auto;
  background:white;
  color:black;
  padding:35px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

label{
  font-weight:bold;
  display:block;
  margin-top:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
}

button{
  width:100%;
  padding:16px;
  margin-top:25px;
  background:#22c55e;
  border:none;
  color:white;
  font-size:16px;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#16a34a;
}

.makerworld{
  background:#f1f5f9;
  padding:12px;
  border-radius:6px;
  margin-bottom:15px;
  font-size:14px;
}

footer{
  text-align:center;
  padding:30px;
  opacity:.8;
}
</style>
</head>

<body>

<header>
  <h1>Abe's 3D Printing</h1>
  <p>Send a model and request a custom 3D print</p>
</header>

<div class="container">

<div class="makerworld">
  <strong>What is MakerWorld?</strong><br>
  MakerWorld is a website where people share 3D models for printing. 
  You can browse, find a model you like, and use the exact model name here.
  <br><a href="https://makerworld.com" target="_blank">Visit MakerWorld →</a>
</div>

<form action="https://formspree.io/f/meerkgkn" method="POST">

<label>Your Name</label>
<input type="text" name="name" required>

<label>Your Email</label>
<input type="email" name="email" required>

<label>Model Name (from MakerWorld / Thingiverse / Printables)</label>
<input type="text" name="model_name" placeholder="Example: Articulated Dragon by Cinderwing3D" required>

<label>Color</label>
<select name="color">
<option>Black</option>
<option>White</option>
<option>Red</option>
<option>Blue</option>
<option>Green</option>
<option>Rainbow</option>
<option>Other (describe in email)</option>
</select>

<label>Quantity</label>
<input type="number" name="quantity" value="1" min="1">

<label>Price You Are Hoping For ($)</label>
<input type="number" name="requested_price" placeholder="Example: 10">

<label>When Do You Need It?</label>
<input type="date" name="deadline">

<label>Choose a pickup location for your print?</label>
<input type="text" name="meeting_place" placeholder="Example: DC  / Middle school lounge" required>

<button type="submit">Send Print Request</button>

</form>

</div>

<footer>
© 2026 Abe's 3D Printing
</footer>

</body>
</html>
